# Copia de referencia tomada de pubspec.yaml

name: ecoruta
description: "A new Flutter project."
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ^3.10.7

dependencies:
  provider: ^6.1.2
  flutter_bloc: ^8.1.6
  flutter:
    sdk: flutter
  video_player: ^2.9.2
  flutter_map: ^7.0.2
  flutter_compass: ^0.8.1
  latlong2: ^0.9.1
  geolocator: ^13.0.2
  collection: ^1.19.1
  cupertino_icons: ^1.0.8
  firebase_core_dart: ^1.0.1
  http: ^1.2.0
  firebase_core: ^4.7.0
  firebase_auth: ^6.4.0
  cloud_firestore: ^6.3.0
  font_awesome_flutter: ^10.11.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/videos/welcome.mp4
    - assets/images/welcome.png
    - assets/images/avatars/
    - assets/images/Chonetes/
    - assets/images/Frogs/
